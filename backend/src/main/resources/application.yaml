spring:
  application:
    name: fintrack-ai-backend
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: true
    show-sql: true
  h2:
    console:
      enabled: true
      path: /api/v1/swagger/h2-console
server:
  port: 6969

springdoc:
  api-docs:
    path: /api/v1/swagger/api-docs
  swagger-ui:
    path: /api/v1/swagger/swagger-ui.html

jwt:
    secret: ${JWT_SECRET:this-is-a-very-long-secret-key-for-jwt-authentication-123456}
    access-expiration: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}